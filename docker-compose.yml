version: '3.9'
networks:
  anfa-internal-net:
    driver: bridge
volumes:
  pg_volume_data:
    driver: local
  redis_volume_data:
    driver: local
  n8n_volume_data:
    driver: local
services:
  postgres:
    image: postgres:16-alpine
    container_name: anfa-postgres-db
    restart: unless-stopped
    command: postgres -c wal_level=replica
    security_opt:
    - no-new-privileges:true
    environment:
      POSTGRES_USER: anfa_admin_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: anfa_whatsapp_crm_db
    volumes:
    - pg_volume_data:/var/lib/postgresql/data
    networks:
    - anfa-internal-net
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U anfa_admin_user -d anfa_whatsapp_crm_db
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
  redis:
    image: redis:7-alpine
    container_name: anfa-redis-cache
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    security_opt:
    - no-new-privileges:true
    volumes:
    - redis_volume_data:/data
    networks:
    - anfa-internal-net
    healthcheck:
      test:
      - CMD
      - redis-cli
      - -a
      - ${REDIS_PASSWORD}
      - ping
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
  backend:
    build:
      context: ./backend
    container_name: anfa-fastapi-backend
    restart: unless-stopped
    security_opt:
    - no-new-privileges:true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
    - .env
    environment:
    # config.py requires DATABASE_URL_PRIMARY / DATABASE_URL_REPLICA
    # specifically (not "DATABASE_URL") - both are required fields with
    # no default, so the app fails Settings validation without these.
    # There is no physical read replica in this docker-compose setup, so
    # both point at the same primary Postgres instance for now.
    - DATABASE_URL_PRIMARY=postgresql+asyncpg://anfa_admin_user:${DB_PASSWORD}@postgres:5432/anfa_whatsapp_crm_db
    - DATABASE_URL_REPLICA=postgresql+asyncpg://anfa_admin_user:${DB_PASSWORD}@postgres:5432/anfa_whatsapp_crm_db
    - REDIS_HOST=redis
    - REDIS_PORT=6379
    - REDIS_PASSWORD=${REDIS_PASSWORD}
    - ENCRYPTION_MASTER_KEY=${ENCRYPTION_MASTER_KEY}
    - ADMIN_USERNAME=${ADMIN_USERNAME}
    - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    networks:
    - anfa-internal-net
    healthcheck:
      test:
      - CMD
      - python
      - -c
      - import urllib.request; urllib.request.urlopen('http://localhost:4000/api/health')
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    read_only: true
    tmpfs:
    - /tmp
  inbound_worker:
    build:
      context: ./backend
    container_name: anfa-inbound-worker
    restart: unless-stopped
    security_opt:
    - no-new-privileges:true
    command: arq worker.WorkerConfig
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
    - .env
    environment:
    # C1/C4 Fix: Workers need the same required env vars as the backend.
    # config.py requires DATABASE_URL_PRIMARY + DATABASE_URL_REPLICA (not DATABASE_URL).
    # SECRET_KEY, ENCRYPTION_MASTER_KEY, ADMIN_USERNAME, ADMIN_PASSWORD are all
    # required Fields with no default — missing them causes an immediate ValidationError crash.
    - DATABASE_URL_PRIMARY=postgresql+asyncpg://anfa_admin_user:${DB_PASSWORD}@postgres:5432/anfa_whatsapp_crm_db
    - DATABASE_URL_REPLICA=postgresql+asyncpg://anfa_admin_user:${DB_PASSWORD}@postgres:5432/anfa_whatsapp_crm_db
    - REDIS_HOST=redis
    - REDIS_PORT=6379
    - REDIS_PASSWORD=${REDIS_PASSWORD}
    - SECRET_KEY=${SECRET_KEY}
    - ENCRYPTION_MASTER_KEY=${ENCRYPTION_MASTER_KEY}
    - ADMIN_USERNAME=${ADMIN_USERNAME}
    - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    networks:
    - anfa-internal-net
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    read_only: true
    tmpfs:
    - /tmp
  outbound_worker:
    build:
      context: ./backend
    container_name: anfa-outbound-worker
    restart: unless-stopped
    security_opt:
    - no-new-privileges:true
    # Runs the outbound worker that actually sends WhatsApp messages via Meta Graph API.
    # This handles send_text_message_task, send_whatsapp_message_job, send_template_message_task
    # with sliding-window rate limiting and 429 backoff built in.
    command: arq app.workers.outbound.WorkerConfig
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
    - .env
    environment:
    # C1/C4 Fix: Same required env vars as inbound_worker above.
    - DATABASE_URL_PRIMARY=postgresql+asyncpg://anfa_admin_user:${DB_PASSWORD}@postgres:5432/anfa_whatsapp_crm_db
    - DATABASE_URL_REPLICA=postgresql+asyncpg://anfa_admin_user:${DB_PASSWORD}@postgres:5432/anfa_whatsapp_crm_db
    - REDIS_HOST=redis
    - REDIS_PORT=6379
    - REDIS_PASSWORD=${REDIS_PASSWORD}
    - SECRET_KEY=${SECRET_KEY}
    - ENCRYPTION_MASTER_KEY=${ENCRYPTION_MASTER_KEY}
    - ADMIN_USERNAME=${ADMIN_USERNAME}
    - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    networks:
    - anfa-internal-net
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    read_only: true
    tmpfs:
    - /tmp
  n8n:
    image: n8nio/n8n:latest
    container_name: anfa-n8n-automation
    restart: unless-stopped
    security_opt:
    - no-new-privileges:true
    environment:
    - N8N_HOST=0.0.0.0
    - N8N_PORT=5678
    - N8N_PROTOCOL=http
    - WEBHOOK_URL=http://n8n:5678/
    - GENERIC_TIMEZONE=Asia/Karachi
    - TZ=Asia/Karachi
    - N8N_BASIC_AUTH_ACTIVE=true
    - N8N_BASIC_AUTH_USER=admin
    - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD}
    volumes:
    - n8n_volume_data:/home/node/.n8n
    networks:
    - anfa-internal-net
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
  frontend:
    build:
      context: ./frontend
      args:
      # NEXT_PUBLIC_* vars are inlined at build time - they MUST be passed
      # here (build.args), not just under environment: below, or Next.js
      # never sees them and silently falls back to its hardcoded defaults.
      # H8 Fix: Empty string = use relative paths through nginx (same origin).
      # The browser cannot resolve 'backend:4000' (Docker-internal hostname).
      # nginx proxies /api/* to the backend container, so relative paths work correctly.
      # For production with a real domain, set this to: https://your-domain.com
      NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:-}"
      # Must match ADMIN_USERNAME / ADMIN_PASSWORD below (used by the
      # frontend to obtain a JWT via POST /api/settings/token - see
      # frontend/src/lib/api-client.ts). Stopgap until a real login page
      # exists; do not use this pattern for multi-user setups.
      NEXT_PUBLIC_ADMIN_USERNAME: "${ADMIN_USERNAME}"
      NEXT_PUBLIC_ADMIN_PASSWORD: "${ADMIN_PASSWORD}"
    container_name: anfa-nextjs-ui
    restart: unless-stopped
    security_opt:
    - no-new-privileges:true
    depends_on:
      backend:
        condition: service_healthy
    env_file:
    - .env
    environment:
    - NEXT_PUBLIC_API_URL=
    networks:
    - anfa-internal-net
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    read_only: true
  nginx:
    build:
      context: ./nginx
    container_name: anfa-nginx-proxy
    restart: unless-stopped
    ports:
    - 80:80
    - 443:443
    depends_on:
    - frontend
    - backend
    networks:
    - anfa-internal-net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    read_only: true
    tmpfs:
    - /var/cache/nginx
    - /var/run
    - /tmp
