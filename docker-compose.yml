version: "3.9"

networks:
  anfa-internal-net:
    driver: bridge

volumes:
  pg_volume_data:
    driver: local
  redis_volume_data:
    driver: local

services:
  postgres:
    image: postgres:16-alpine
    container_name: anfa-postgres-db
    restart: unless-stopped
    command: postgres -c wal_level=replica
    security_opt:
      - no-new-privileges:true
    environment:
      POSTGRES_USER: anfa_admin_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: anfa_whatsapp_crm_db
    volumes:
      - pg_volume_data:/var/lib/postgresql/data
    networks:
      - anfa-internal-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U anfa_admin_user -d anfa_whatsapp_crm_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: anfa-redis-cache
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    security_opt:
      - no-new-privileges:true
    volumes:
      - redis_volume_data:/data
    networks:
      - anfa-internal-net
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: anfa-fastapi-backend
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://anfa_admin_user:${DB_PASSWORD}@postgres:5432/anfa_whatsapp_crm_db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    networks:
      - anfa-internal-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/api/health')"]
      interval: 15s
      timeout: 5s
      retries: 3

  inbound_worker:
    build:
      context: ./backend
    container_name: anfa-inbound-worker
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    command: arq worker.WorkerConfig
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://anfa_admin_user:${DB_PASSWORD}@postgres:5432/anfa_whatsapp_crm_db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    networks:
      - anfa-internal-net

  frontend:
    build:
      context: ./frontend
    container_name: anfa-nextjs-ui
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    depends_on:
      backend:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:4000
    networks:
      - anfa-internal-net

  nginx:
    build:
      context: ./nginx
    container_name: anfa-nginx-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - frontend
      - backend
    networks:
      - anfa-internal-net
