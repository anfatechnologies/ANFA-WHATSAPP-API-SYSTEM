name: Branding Protection Check

# ANFA WhatsApp API — Branding Protection CI
# This workflow fails the build if critical branding elements are removed from the landing page.
# Any PR touching the landing page (page.tsx or its landing/* components) is automatically
# flagged for manual review.
#
# NOTE: branding content may live directly in page.tsx OR be split across
# frontend/src/components/landing/*.tsx (e.g. Navbar.tsx, Footer.tsx) - this
# check scans ALL of those files combined, not just page.tsx, so refactoring
# the landing page into components doesn't silently bypass the check.

on:
  pull_request:
    paths:
      - 'frontend/src/app/page.tsx'
      - 'frontend/src/app/landing-content.ts'
      - 'frontend/src/components/landing/**'
  push:
    branches: [main]
    paths:
      - 'frontend/src/app/page.tsx'
      - 'frontend/src/components/landing/**'

jobs:
  branding-check:
    name: Verify ANFA Branding Attribution
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check ANFA branding across landing page + components
        run: |
          # Concatenate page.tsx with every file under components/landing/ so
          # branding content is found regardless of which file it lives in.
          COMBINED=$(mktemp)
          cat frontend/src/app/page.tsx > "$COMBINED" 2>/dev/null || true
          if [ -d "frontend/src/components/landing" ]; then
            cat frontend/src/components/landing/*.tsx >> "$COMBINED" 2>/dev/null || true
          fi

          FAIL=0

          echo "=== ANFA Branding Attribution Check ==="

          check() {
            local PATTERN="$1"
            local DESC="$2"
            if grep -qF "$PATTERN" "$COMBINED"; then
              echo "✅ PASS: $DESC"
            else
              echo "❌ FAIL: $DESC — '$PATTERN' not found in page.tsx or components/landing/*.tsx"
              FAIL=1
            fi
          }

          check "ANFA Technologies"           "Footer credit line present"
          check "github.com/anfatechnologies"  "GitHub attribution link present"
          check "Built with"                   "Built-by line present"
          check "ANFA"                         "Product/brand name present"
          check "© "                           "Copyright line present"

          rm -f "$COMBINED"

          if [ "$FAIL" -eq 1 ]; then
            echo ""
            echo "=== BRANDING CHECK FAILED ==="
            echo "Required branding elements are missing from the landing page (page.tsx and/or components/landing/*.tsx)."
            echo "Per LICENSE attribution clause, these elements MUST NOT be removed."
            echo "If you believe this is a false positive, request review from the repo owner."
            exit 1
          fi

          echo ""
          echo "=== All branding checks passed ==="

      - name: Flag PR for manual review (landing page modified)
        if: github.event_name == 'pull_request'
        run: |
          echo "⚠️  This PR modifies the landing page."
          echo "Per repo policy, any change to the landing page requires manual review from the repo owner."
          echo "Do NOT auto-merge this PR."
          # Post a comment or label via GH API if GITHUB_TOKEN is available
          if [ -n "${{ secrets.GITHUB_TOKEN }}" ]; then
            gh pr comment ${{ github.event.pull_request.number }} \
              --body "⚠️ **Landing Page Modified — Manual Review Required**

          This PR touches \`frontend/src/app/page.tsx\` and/or \`frontend/src/components/landing/*\` (the ANFA landing page).

          Per repo policy and LICENSE attribution clause:
          - A repo owner must manually review branding elements before merge.
          - Do **not** auto-merge this PR.

          The automated branding check has run and passed. A human must still verify the intent of the changes." \
              || true
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
