name: CI — Test, Lint, Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # =============================================================================
  # BACKEND: Python Tests + Linting
  # =============================================================================
  backend-test:
    name: Backend Tests (Python)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_anfa_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL_PRIMARY: postgresql+asyncpg://test_user:test_password@localhost:5432/test_anfa_db
      DATABASE_URL_REPLICA: postgresql+asyncpg://test_user:test_password@localhost:5432/test_anfa_db
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      SECRET_KEY: "ci-test-secret-key-that-is-at-least-32-characters-long"
      DEBUG: "true"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run pytest with coverage
        run: |
          cd backend
          pytest --cov=app --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          files: backend/coverage.xml
          flags: backend
          fail_ci_if_error: false

  # =============================================================================
  # BACKEND: Docker Build Verification
  # =============================================================================
  backend-docker-build:
    name: Backend Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend Docker image
        run: docker build -t anfa-backend:ci ./backend

  # =============================================================================
  # FRONTEND: Type Check + Build
  # =============================================================================
  frontend-build:
    name: Frontend Build (Next.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Type check
        run: |
          cd frontend
          npx tsc --noEmit

      - name: Build production bundle
        run: |
          cd frontend
          npm run build
        env:
          NEXT_PUBLIC_API_URL: http://backend:4000

  # =============================================================================
  # SECURITY: Secret Scanning
  # =============================================================================
  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect secrets with TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified
