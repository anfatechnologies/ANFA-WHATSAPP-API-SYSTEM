# /nginx/nginx.conf
# ANFA Nginx Proxy Configuration
# CRITICAL: SSE streaming routes have proxy_buffering disabled to prevent delays
# Static configuration - no dynamic reloads via docker.sock

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Performance optimizations
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 2048;

    # Gzip compression for static assets
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Upstream definitions for load balancing and health checks
    upstream frontend_server {
        server frontend:3000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream backend_server {
        server backend:4000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream n8n_server {
        server n8n:5678 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    server {
        listen 80;
        server_name localhost;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Next.js Static & SSR Frontend
        location / {
            proxy_pass         http://frontend_server;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection 'upgrade';
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            
            # Timeouts for SSR pages
            proxy_connect_timeout 30s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
        }

        # n8n Automation Engine Internal Routing
        location /n8n/ {
            proxy_pass         http://n8n_server/;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection 'upgrade';
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Standard FastAPI REST Routes
        location /api/ {
            # Webhook Ingress Hardening (Step 2)
            location ^~ /api/webhooks/ {
                proxy_pass         http://backend_server;
                proxy_http_version 1.1;
                proxy_set_header   Host $host;
                proxy_set_header   X-Real-IP $remote_addr;
                proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header   X-Forwarded-Proto $scheme;
                
                # Payload Limit: Prevent OOM CPU Exhaustion
                client_max_body_size 5M;
                
                # IP Whitelisting: Meta ASN Ranges Placeholder
                # allow 32.2.0.0/16;
                # deny all;
            }

            # Exclude SSE stream from standard API handling
            location ~ ^/api/chats/stream$ {
                # Handled separately below
                return 404;
            }
            
            proxy_pass         http://backend_server;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            
            # Buffering enabled for standard REST responses (improves performance)
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
            
            proxy_connect_timeout 30s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
        }

        # CRITICAL: SSE Streaming Route Ingress Configuration
        # Disables all buffering to ensure instant chunk transmission
        location /api/chats/stream {
            proxy_pass         http://backend_server;
            proxy_http_version 1.1;
            # TCP Keepalives for SSE
            proxy_set_header   Connection "keep-alive";
            keepalive_timeout  60s;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            
            # CRITICAL: Disable buffering & caching to ensure instant chunk transmission
            proxy_buffering             off;
            proxy_cache                 off;
            chunked_transfer_encoding   off;
            proxy_read_timeout          24h;
            proxy_send_timeout          24h;
            
            # Prevent nginx from closing connection on long-running streams
            proxy_ignore_client_abort on;
        }

        # Health check endpoint
        location /nginx-health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}
