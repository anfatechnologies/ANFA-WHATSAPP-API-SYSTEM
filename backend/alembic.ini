# /backend/alembic.ini
# Alembic Database Migration Configuration
# Run migrations: alembic upgrade head
# Create new migration: alembic revision --autogenerate -m "description"

[alembic]
# Path to migration scripts directory
script_location = app/migrations/alembic

# Async PostgreSQL connection URL — overridden by env.py from settings
# Do NOT put actual credentials here — they are loaded from .env
sqlalchemy.url = postgresql+asyncpg://user:pass@localhost/db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
